name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check code formatting (black)
        run: |
          black --check _runtime/

      - name: Check import sorting (isort)
        run: |
          isort --check-only _runtime/

      - name: Lint with flake8
        run: |
          # E501: line too long (handled by black)
          # W503: line break before binary operator
          flake8 _runtime/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 _runtime/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-pyyaml
          pip install -r _runtime/requirements.txt

      - name: Type check with mypy
        run: |
          mypy _runtime/ --ignore-missing-imports || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Security check with bandit
        run: |
          bandit -r _runtime/ -ll || true

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r _runtime/requirements.txt

      - name: Run tests with coverage
        run: |
          cd _runtime
          pytest q64_reference_test.py --cov=. --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: _runtime/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
